---
name: Lint

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository:
    name: Repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.14"
          cache: pip

      - name: Install validators
        run: python -m pip install -r requirements-dev.txt

      - name: Validate repository
        run: python scripts/validate_addons.py

      - name: Validate YAML
        run: yamllint .

      - name: Validate PromptScript
        run: |
          npx --yes @promptscript/cli@1.13.2 check
          npx --yes @promptscript/cli@1.13.2 validate --strict
          npx --yes @promptscript/cli@1.13.2 compile
          git diff --exit-code -- \
            AGENTS.md .factory/skills/promptscript/SKILL.md

      - name: Validate shell
        run: |
          find bonds gluetun -type f \
            \( -name '*.sh' -o -name 'addon-entrypoint' \) \
            -print0 | xargs -0 shellcheck

      - name: Validate workflows
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7  # v2.2.0

  addon:
    name: Add-on ${{ matrix.addon }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        addon:
          - bonds
          - gluetun
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Run Home Assistant add-on linter
        uses: frenck/action-addon-linter@f995494fd84fae6310d23617e66d0e37de4f14eb  # v2.21
        with:
          path: ./${{ matrix.addon }}
