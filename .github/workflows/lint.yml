---
name: Lint

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository:
    name: Repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install validators
        run: python -m pip install -r requirements-dev.txt

      - name: Validate repository
        run: python scripts/validate_addons.py

      - name: Validate YAML
        run: yamllint .

      - name: Validate PromptScript
        run: |
          npx --yes @promptscript/cli@1.14.0 check
          npx --yes @promptscript/cli@1.14.0 validate --strict
          npx --yes @promptscript/cli@1.14.0 compile
          git diff --exit-code -- \
            AGENTS.md .factory/skills/promptscript/SKILL.md

      - name: Validate shell
        run: |
          find authentik bonds gluetun stirling-pdf -type f \
            \( -name '*.sh' -o -name 'addon-entrypoint' \) \
            -print0 | xargs -0 shellcheck

      - name: Validate workflows
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7  # v2.2.0

  changes:
    name: Detect changed add-ons
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      addons: ${{ steps.filter.outputs.addons }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Select changed add-ons
        id: filter
        env:
          EVENT: ${{ github.event_name }}
          BASE: ${{ github.event.pull_request.base.sha }}
        run: |
          all='["authentik","bonds","gluetun","stirling-pdf"]'
          # Lint every add-on on pushes to main and when this workflow changes;
          # otherwise only the add-ons touched by the pull request.
          if [ "$EVENT" != "pull_request" ]; then
            echo "addons=$all" >>"$GITHUB_OUTPUT"
            exit 0
          fi
          changed=$(git diff --name-only "$BASE" "$GITHUB_SHA")
          if printf '%s\n' "$changed" | grep -Eq '^\.github/workflows/lint\.yml$'; then
            echo "addons=$all" >>"$GITHUB_OUTPUT"
            exit 0
          fi
          addons='[]'
          for addon in authentik bonds gluetun stirling-pdf; do
            if printf '%s\n' "$changed" | grep -q "^${addon}/"; then
              addons=$(jq -c --arg addon "$addon" '. + [$addon]' <<<"$addons")
            fi
          done
          echo "addons=$addons" >>"$GITHUB_OUTPUT"

  addon:
    name: Add-on ${{ matrix.addon }}
    needs: changes
    if: needs.changes.outputs.addons != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJSON(needs.changes.outputs.addons) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Run Home Assistant add-on linter
        uses: frenck/action-addon-linter@f995494fd84fae6310d23617e66d0e37de4f14eb  # v2.21
        with:
          path: ./${{ matrix.addon }}

  gate:
    name: Lint gate
    needs:
      - repository
      - changes
      - addon
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require lint results
        env:
          REPOSITORY: ${{ needs.repository.result }}
          CHANGES: ${{ needs.changes.result }}
          ADDON: ${{ needs.addon.result }}
        run: |
          # Stable required check for branch protection: the per-add-on linter
          # may be skipped when nothing relevant changed.
          if [ "$REPOSITORY" != "success" ]; then
            echo "::error::Repository checks $REPOSITORY"
            exit 1
          fi
          if [ "$CHANGES" != "success" ]; then
            echo "::error::Change detection $CHANGES"
            exit 1
          fi
          case "$ADDON" in
            success | skipped)
              echo "Lint gate passed (add-on linter: $ADDON)"
              ;;
            *)
              echo "::error::Add-on linter $ADDON"
              exit 1
              ;;
          esac
