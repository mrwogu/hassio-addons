---
name: Publish

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  packages: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install validators
        run: python -m pip install -r requirements-dev.txt

      - name: Run repository checks
        run: make check

      - name: Validate YAML
        run: yamllint .

      - name: Validate shell
        run: |
          find authentik bonds ddclient gluetun stirling-pdf -type f \
            \( -name '*.sh' -o -name 'addon-entrypoint' \) \
            -print0 | xargs -0 shellcheck

      - name: Validate workflows
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7  # v2.2.0

      - name: Validate authentik metadata
        uses: frenck/action-addon-linter@f995494fd84fae6310d23617e66d0e37de4f14eb  # v2.21
        with:
          path: ./authentik

      - name: Validate Bonds metadata
        uses: frenck/action-addon-linter@f995494fd84fae6310d23617e66d0e37de4f14eb  # v2.21
        with:
          path: ./bonds

      - name: Validate ddclient metadata
        uses: frenck/action-addon-linter@f995494fd84fae6310d23617e66d0e37de4f14eb  # v2.21
        with:
          path: ./ddclient

      - name: Validate Gluetun metadata
        uses: frenck/action-addon-linter@f995494fd84fae6310d23617e66d0e37de4f14eb  # v2.21
        with:
          path: ./gluetun

      - name: Validate Stirling-PDF metadata
        uses: frenck/action-addon-linter@f995494fd84fae6310d23617e66d0e37de4f14eb  # v2.21
        with:
          path: ./stirling-pdf

  changes:
    name: Detect unreleased add-ons
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      addons: ${{ steps.filter.outputs.addons }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Select unreleased add-ons
        id: filter
        run: |
          addons='[]'
          for addon in authentik bonds ddclient gluetun stirling-pdf; do
            version=$(sed -n 's/^version: "\(.*\)"$/\1/p' "$addon/config.yaml")
            if [ -z "$version" ]; then
              echo "::error::Could not read $addon version"
              exit 1
            fi
            tag="$addon/$version"
            if git ls-remote --exit-code --tags origin "refs/tags/$tag" \
              >/dev/null 2>&1
            then
              continue
            else
              status=$?
            fi
            if [ "$status" -ne 2 ]; then
              echo "::error::Could not verify release tag $tag"
              exit 1
            fi
            addons=$(jq -c --arg addon "$addon" '. + [$addon]' <<<"$addons")
          done
          echo "addons=$addons" >>"$GITHUB_OUTPUT"

  addon:
    name: ${{ matrix.addon }}
    needs:
      - changes
      - validate
    if: >-
      github.repository == 'mrwogu/hassio-addons'
      && needs.changes.outputs.addons != '[]'
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJSON(needs.changes.outputs.addons) }}
    uses: ./.github/workflows/build-addon.yml
    with:
      addon: ${{ matrix.addon }}
      publish: true
