---
configuration:
  postgres_host:
    name: Host PostgreSQL
    description: Nazwa hosta lub adres IP zewnętrznego serwera PostgreSQL.
  postgres_port:
    name: Port PostgreSQL
    description: Port serwera PostgreSQL.
  postgres_db:
    name: Baza danych PostgreSQL
    description: Nazwa bazy danych authentik.
  postgres_user:
    name: Użytkownik PostgreSQL
    description: Użytkownik bazy danych, jako który łączy się authentik.
  postgres_password:
    name: Hasło PostgreSQL
    description: Hasło użytkownika bazy danych.
  redis_host:
    name: Host Redis
    description: Nazwa hosta lub adres IP zewnętrznego serwera Redis.
  redis_port:
    name: Port Redis
    description: Port serwera Redis.
  redis_db:
    name: Baza danych Redis
    description: Numer logicznej bazy danych Redis używanej przez authentik.
  redis_password:
    name: Hasło Redis
    description: Opcjonalne hasło do serwera Redis.
  log_level:
    name: Poziom logów
    description: Szczegółowość logów authentik.
  error_reporting:
    name: Raportowanie błędów
    description: Wysyłaj anonimowe raporty o błędach do projektu authentik.
  secret_key:
    name: Klucz tajny
    description: Klucz podpisujący. Pozostaw pusty, aby wygenerować go automatycznie.
  env_vars:
    name: Zaawansowane zmienne środowiskowe
    description: Dodatkowe zmienne AUTHENTIK_* upstream. Nie można nadpisać nazw zarządzanych ani chronionych.
network:
  9000/tcp: Interfejs HTTP authentik
  9443/tcp: Interfejs HTTPS authentik
